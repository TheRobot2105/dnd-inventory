# R3.1 local dev stack — Postgres + server + web.
#
# Bring up: `cd infra/docker && cp .env.example .env && docker compose up --build`
# Stops:    `docker compose down`            (preserves the postgres-data volume)
# Wipes:    `docker compose down -v`         (drops the volume — clean reseed)
#
# Postgres binds the host on `${POSTGRES_PORT:-5433}` to avoid clashing
# with a host-installed Postgres on the default 5432. Inside the compose
# network it stays on 5432.

name: dnd-inv
services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dnd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dnd}
      POSTGRES_DB: ${POSTGRES_DB:-dnd_inv}
      # Postgres 18+ image stores data in major-version subdirectories under
      # /var/lib/postgresql (docker-library/postgres#1259). Mount the named
      # volume at that root and point PGDATA at the versioned subdir so
      # `pg_upgrade --link` stays an option later.
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dnd} -d ${POSTGRES_DB:-dnd_inv}']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - proxy

  server:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # Bind to all interfaces INSIDE the container so the compose
      # network (and the published host port) can reach the server. Local
      # `pnpm dev` outside the container defaults to 127.0.0.1 — see
      # src/config/env.ts.
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-dnd}:${POSTGRES_PASSWORD:-dnd}@postgres:5432/${POSTGRES_DB:-dnd_inv}
      # `WEB_ORIGIN` gates CORS allow-origin AND the Auth.js redirect
      # whitelist. Must match the origin the SPA is loaded from in a
      # browser — otherwise the session cookie can't ride along on
      # `fetch(... { credentials: 'include' })`. Three typical values:
      #   - `--profile proxy` setup: `http://localhost:${PROXY_PORT}`.
      #   - Host nginx in prod: the public https origin.
      #   - Legacy split-port: `http://localhost:${WEB_PORT}` (works
      #     for local-only mode; breaks server-mode auth).
      # Defaults to the split-port URL for backwards-compat.
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:${WEB_PORT:-5173}}
      LOG_LEVEL: info
      # R3.2 / R3.5 — Auth.js. AUTH_SECRET is required at all times.
      # DISCORD_* are OPTIONAL: missing values disable the /auth/discord/*
      # routes (they return 503) and hide the Discord button on the web
      # Login screen. The server logs a startup warning. The compose .env
      # file forwards them — leave them blank to run email-only.
      AUTH_SECRET: ${AUTH_SECRET}
      # R3.5 — Cookie posture. Leave blank/false for HTTPS deployments;
      # set true ONLY for self-hosted HTTP-only stacks (the proxy profile
      # on http://localhost:8080 falls into this bucket). Without this,
      # the browser drops the `Secure __Host-` session cookie on plain
      # HTTP and users appear logged out on every navigation.
      SESSION_COOKIE_INSECURE: ${SESSION_COOKIE_INSECURE:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-}
      # R3.3 / R3.5 — email OTP via SMTP. All five are OPTIONAL: missing
      # values disable the /auth/email/* routes (they return 503) and
      # hide the Email button on the web Login screen. The server logs
      # a startup warning. See README §3 for SMTP relay options.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # R3.4.b — nightly snapshots. The volume mount below maps
      # SNAPSHOT_DIR to a named docker volume so files survive
      # container restarts.
      SNAPSHOTS_ENABLED: ${SNAPSHOTS_ENABLED:-true}
      SNAPSHOT_DIR: ${SNAPSHOT_DIR:-/data/snapshots}
      SNAPSHOT_RETENTION_DAYS: ${SNAPSHOT_RETENTION_DAYS:-30}
    ports:
      - '${SERVER_PORT:-3000}:3000'
    volumes:
      - snapshots-data:${SNAPSHOT_DIR:-/data/snapshots}
    # Boot sequence inside the container:
    #   1. `prisma migrate deploy` — applies migrations (no-op when up-to-date).
    #   2. `node apps/server/dist/index.js` — runs the seed runner then listens.
    command: ['sh', '-c', 'cd apps/server && pnpm exec prisma migrate deploy && node dist/index.js']
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3000/healthz'').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.dnd-server.rule=Host(`${FQDN}`) && (Path(`/healthz`) || PathPrefix(`/auth`) || PathPrefix(`/sync`) || Path(`/parties`) || PathPrefix(`/parties/`) || PathPrefix(`/socket.io`) || PathPrefix(`/socket.io/`))
      - traefik.http.routers.dnd-server.entrypoints=websecure
      - traefik.http.routers.dnd-server.middlewares=default-headers@file
    networks:
      - proxy

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        # R3.5 — `VITE_SERVER_URL` is read by Vite at BUILD time and
        # inlined into the bundle. Empty / unset → local-only build
        # (no Login / Logout / Account chrome). Set to the full
        # origin under which the server is reachable from a browser
        # (e.g. `https://dnd.example.com`) → server-mode bundle.
        # IMPORTANT: changing this value requires a rebuild
        # (`docker compose up -d --build web`); a bare restart will
        # serve the same bundle.
        VITE_SERVER_URL: ${VITE_SERVER_URL:-}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    # R8.2 — the web container now serves the static bundle via
    # `nginx:alpine` on port 80. No Node/Vite runtime, no
    # `VITE_ALLOWED_HOSTS` (that was a `vite preview` knob). Host-facing
    # port keeps its default of 5173 so existing URLs don't change.
    ports:
      - '${WEB_PORT:-5173}:80'
    labels:
      - traefik.enable=true
      - traefik.http.routers.dnd-inventory-https.rule=Host(`${FQDN}`)
      - traefik.http.routers.dnd-inventory-https.entrypoints=websecure
      - traefik.http.routers.dnd-inventory-http.rule=Host(`${FQDN}`)
      - traefik.http.routers.dnd-inventory-http.entrypoints=web
      - traefik.http.routers.dnd-inventory-https.middlewares=default-headers@file
    networks:
      - proxy

volumes:
  postgres-data:
  snapshots-data:
  caddy-data:
  caddy-config:
networks:
  proxy:
    external: true
